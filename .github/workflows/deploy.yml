name: Deploy to WP Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy theme
        uses: wpengine/github-action-wpe-site-deploy@v3
        with:
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_SSHG_KEY_PRIVATE }}
          WPE_ENV: thelocalsgroup
          SRC_PATH: "wp-content/themes/locals-realty/"
          REMOTE_PATH: "wp-content/themes/locals-realty/"
          FLAGS: "-azvr --inplace --delete --exclude='.git*' --exclude='node_modules/' --exclude='.DS_Store'"

      - name: Deploy custom plugins
        uses: wpengine/github-action-wpe-site-deploy@v3
        with:
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_SSHG_KEY_PRIVATE }}
          WPE_ENV: thelocalsgroup
          SRC_PATH: "wp-content/plugins/"
          REMOTE_PATH: "wp-content/plugins/"
          FLAGS: "-azvr --inplace --include='locals-*/***' --exclude='*' --exclude='.git*' --exclude='.DS_Store'"
